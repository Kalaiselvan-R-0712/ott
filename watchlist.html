<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchlist | Stackly</title>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Plus Jakarta Sans',sans-serif; }
        
        body { background:#0a0a0a; color:#fff; overflow-x:hidden; min-height: 100vh; }

        header {
            position:fixed; top:0; width:100%; height:70px;
            display:flex; justify-content:space-between; align-items:center;
            padding:0 25px; background:#000; border-bottom:1px solid rgba(255,255,255,0.08);
            z-index:3000; /* Higher than sidebar */
        }

        .header-left { display: flex; align-items: center; }
        .logo img { height:32px; }

        .profile { display:flex; gap:15px; align-items:center; }

        /* SIDEBAR FIX: Solid background and proper stacking */
        .sidebar {
            width:250px; 
            background:#050505; /* Solid dark grey/black */
            position:fixed; 
            top:70px; 
            height:calc(100% - 70px);
            padding:20px; 
            display:flex; 
            flex-direction:column;
            z-index: 2500; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar a {
            display:flex; gap:12px; padding:12px; border-radius:10px;
            color:#aaa; text-decoration:none; margin-bottom:5px;
            align-items: center; transition: 0.2s;
        }
        .sidebar a:hover { background:#111; color:#ff0080; }
        .sidebar a.active { background:#ff0080; color:#fff; font-weight: 600; }

        .sidebar .logout {
    color:#ff4d4d;
    border:1px solid rgba(255,77,77,0.2);
    background: rgba(255, 77, 77, 0.03);
    margin-top:10px; /* just below settings */
    cursor:pointer;
    padding:12px;
    border-radius:10px;
    display:flex;
    gap:12px;
    align-items:center;
    text-decoration:none;
}

        .sidebar .logout:hover { background: rgba(255, 77, 77, 0.1); }

        .main { margin-left:250px; padding:100px 30px; transition: 0.3s; }

        .cards {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(200px, 1fr));
            gap:20px; margin-bottom:30px;
        }

        .card {
            background:#111; padding:25px; border-radius:15px;
            cursor:pointer; transition:.3s; border: 1px solid transparent;
        }
        .card:hover { transform:translateY(-5px); border:1px solid #ff0080; }

        .panel { background:#111; padding:25px; border-radius:15px; margin-bottom:30px; }
        .panel h3 { margin-bottom: 15px; color: #eee; }

        .movies {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(140px, 1fr));
            gap:15px; margin-top:15px;
        }

        .movie img { width:100%; height:200px; object-fit:cover; border-radius:10px; margin-bottom: 8px; }
        .movie { text-align:center; cursor:pointer; transition: 0.2s; }
        .movie:hover { transform: scale(1.05); }

        .btn {
            background:#ff0080; border:none; padding:12px 20px;
            border-radius:8px; color:#fff; margin-top:10px; cursor:pointer; font-weight: 600;
        }

        .hamburger {
            display:none; font-size:22px; cursor:pointer;
            margin-right:15px; color: #fff;
        }

        /* ===== MOBILE FIX ===== */
        @media(max-width:768px) {
            .hamburger { display:block; }

            .sidebar {
                transform:translateX(-100%);
                background:#000; /* Force total black on mobile for NO transparency */
                width: 280px;
                box-shadow: 10px 0 20px rgba(0,0,0,0.5);
            }

            .sidebar.active { transform:translateX(0); }

            .main { margin-left:0; padding:90px 20px; }

            .overlay {
                position:fixed; top:0; left:0;
                width:100%; height:100%;
                background:rgba(0,0,0,0.8);
                opacity:0; visibility:hidden;
                transition:0.3s; z-index:2000;
                backdrop-filter: blur(4px);
            }

            .overlay.active { opacity:1; visibility:visible; }
        }
    </style>
</head>

<body>

<header>
    <div class="header-left">
        <div class="hamburger" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
        </div>
        <div class="logo">
            <img src="assets/images/logo/stackly_logo.webp" alt="Stackly">
        </div>
    </div>

    <div class="profile">
        <i class="fa-regular fa-bell" onclick="go404()" style="cursor: pointer; font-size: 18px;"></i>
        <i class="fa-regular fa-circle-user" 
   onclick="go404()" 
   style="font-size: 22px; cursor: pointer;"></i>
        <div>
            <div id="profileName" style="font-weight: 600; font-size: 14px;">User</div>
            <div id="profileEmail" style="font-size:11px;color:#aaa;">user@mail.com</div>
        </div>
    </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
<a href="user_dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
<a href="watchlist.html" class="active"><i class="fa-solid fa-heart"></i><span>Watchlist</span></a>
<a href="my_ratings.html"><i class="fa-solid fa-star"></i><span>My Ratings</span></a>
<a href="us_settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </div>

    <a onclick="logoutUser()" class="logout">
        <i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>
    </a>
</aside>

<main class="main">
<h1 style="margin-bottom:25px;font-weight:800;">My Watchlist ❤️</h1>

<div class="movies">
<div class="movie" onclick="go404()"><img src="assets/images/m1.webp"><p>Last Breath</p></div>
<div class="movie" onclick="go404()"><img src="assets/images/m2.webp"><p>Red Night</p></div>
<div class="movie" onclick="go404()"><img src="assets/images/m3.webp"><p>Woochi</p></div>
<div class="movie" onclick="go404()"><img src="assets/images/m4.webp"><p>Dino Land</p></div>
<div class="movie" onclick="go404()"><img src="assets/images/m5.webp"><p>Dark Moon</p></div>
<div class="movie" onclick="go404()"><img src="assets/images/m6.webp"><p>Galaxy War</p></div>
</div>

<div class="panel">
<h3>Manage Watchlist</h3>
<p style="color:#aaa;">Remove or organize your saved content</p>
<button class="btn" onclick="go404()">Manage</button>
</div>
</main>

<script>
    function toggleSidebar(){
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function go404(){ window.location.href="us_404.html"; }

    function logoutUser(){
        localStorage.clear();
        window.location.href="login.html";
    }

    const storedData = localStorage.getItem("userData");
    if(storedData){
        const user = JSON.parse(storedData);
        document.getElementById("profileName").textContent = user.role || "User";
        document.getElementById("profileEmail").textContent = user.email;
    }
</script>

</body>
</html>
