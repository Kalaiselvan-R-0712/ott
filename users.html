<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Manage Users | Stackly</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* ===== GLOBAL STYLES ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        
        body { 
            background: #0a0a0a; 
            color: #fff; 
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto; 
        }

        /* ===== HEADER ===== */
        header { 
            position: fixed; top: 0; left: 0; width: 100%; height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 25px; background: #000; border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
            z-index: 2000; 
        }
        .header-left { display: flex; align-items: center; min-width: 0; }
        .logo img { height: 32px; flex-shrink: 0; }
        .hamburger { display: none; font-size: 20px; cursor: pointer; color: #fff; margin-right: 15px; flex-shrink: 0; }

        .profile { display: flex; gap: 15px; align-items: center; min-width: 0; }
        
        /* Matched Bell Style to Dashboard */
        .bell { position: relative; font-size: 18px; cursor: pointer; flex-shrink: 0; transition: 0.3s; }
        .bell span {
            position: absolute; top: -5px; right: -5px;
            background: #ff0080; color: #fff; font-size: 9px;
            padding: 2px 5px; border-radius: 50%;
        }

        .profile-info { display: flex; flex-direction: column; min-width: 0; }
        .profile-name { font-weight: 600; font-size: 13px; white-space: nowrap; text-transform: capitalize; }
        .profile-email { font-size: 11px; color: #aaa; white-space: nowrap; }

        /* ===== SIDEBAR ===== */
        .sidebar { 
            width: 250px; background: #050505; border-right: 1px solid rgba(255,255,255,0.08); 
            position: fixed; top: 70px; left: 0; height: calc(100vh - 70px); 
            padding: 20px 15px; transition: transform 0.3s ease; z-index: 1500; 
            display: flex; flex-direction: column; 
        }
        .sidebar-content { overflow-y: auto; flex-grow: 1; }
        .sidebar a { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border-radius: 10px; color: #aaa; text-decoration: none; font-size: 14px; margin-bottom: 5px; transition: 0.2s; }
        .sidebar a:hover { color: #ff0080; background: #111; }
        .sidebar a.active { background: linear-gradient(90deg, #ff0080, #ff2a8a); color: #fff; }
        .sidebar .logout { color: #ff4d4d; border: 1px solid rgba(255,77,77,0.1); margin-top: auto; cursor: pointer; }

        /* ===== MAIN CONTENT ===== */
        .main { margin-left: 250px; padding: 100px 30px 40px; transition: 0.3s; max-width: 100%; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: #ff0080; transform: translateY(-3px); background: #161616; }
        .card i { color: #ff0080; font-size: 18px; margin-bottom: 10px; }
        .card h2 { font-size: 24px; font-weight: 800; }
        .card p { font-size: 12px; color: #aaa; }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .add-btn { background: #ff0080; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }

        .table-container { background: #111; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto; padding: 20px; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 15px; color: #555; font-size: 11px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.05); }
        td { padding: 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .status { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(16, 185, 129, 0.1); color: #10b981; }
        .action-btn { background: none; border: none; color: #aaa; cursor: pointer; margin-right: 12px; font-size: 16px; transition: 0.2s; }
        .action-btn:hover { color: #ff0080; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1400; }
        .overlay.active { opacity: 1; visibility: visible; }

        @media (max-width: 768px) {
            .hamburger { display: block; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
            .main { margin-left: 0; padding: 90px 20px; }
            .profile-info { display: none; }
            .cards { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="hamburger" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></div>
        <div class="logo"><img src="assets/images/logo/stackly_logo.webp" alt="Stackly"></div>
    </div>
    <div class="profile">
        <div class="bell" onclick="location.href='ad_404.html'">
            <i class="fa-regular fa-bell"></i>
            <span>3</span>
        </div>
        <i class="fa-regular fa-circle-user" style="font-size: 22px; cursor: pointer;" onclick="location.href='ad_404.html'"></i>
        <div class="profile-info">
            <span class="profile-name" id="profileName">Administrator</span>
            <span class="profile-email" id="profileEmail">admin@biotech.co</span>
        </div>
    </div>
</header>

<div class="overlay" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-content">
        <h3 style="font-size: 11px; color: #555; margin: 10px 15px; letter-spacing: 1px;">MAIN</h3>
        <a href="admin_dashboard.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
        <h3 style="font-size: 11px; color: #555; margin: 25px 15px 10px; letter-spacing: 1px;">MANAGEMENT</h3>
        <a href="users.html" class="active"><i class="fa-solid fa-users"></i><span>Users</span></a>
        <a href="ratings.html"><i class="fa-solid fa-star"></i><span>Ratings</span></a>
        <h3 style="font-size: 11px; color: #555; margin: 25px 15px 10px; letter-spacing: 1px;">SYSTEM</h3>
        <a href="settings.html"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </div>
    <a onclick="logoutUser()" class="logout"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></a>
</aside>

<main class="main">
    <div class="table-header">
        <h1 style="font-size: 28px; font-weight: 800;">Manage Users</h1>
        <button class="add-btn" onclick="window.location.href='ad_404.html'">+ Add New User</button>
    </div>

    <div class="cards">
        <div class="card" onclick="location.href='ad_404.html'"><i class="fa-solid fa-eye"></i><p style="font-size: 13px; color: #aaa; margin-top: 5px;">Views</p><h2>+240M</h2></div>
        <div class="card" onclick="location.href='ad_404.html'"><i class="fa-solid fa-star"></i><p style="font-size: 13px; color: #aaa; margin-top: 5px;">Ratings</p><h2>+55K</h2></div>
        <div class="card" onclick="location.href='ad_404.html'"><i class="fa-solid fa-download"></i><p style="font-size: 13px; color: #aaa; margin-top: 5px;">Downloads</p><h2>+1M</h2></div>
        <div class="card" onclick="location.href='ad_404.html'"><i class="fa-solid fa-users"></i><p style="font-size: 13px; color: #aaa; margin-top: 5px;">Users</p><h2>+2M</h2></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody"></tbody>
        </table>
    </div>
</main>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.querySelector(".overlay").classList.toggle("active");
    }

    function logoutUser() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    const users = [
        { name: "Alex Johnson", email: "alex@example.com", role: "Premium" },
        { name: "Sarah Miller", email: "sarah.m@gmail.com", role: "Free" },
        { name: "Michael Chen", email: "m.chen@stackly.com", role: "Family" },
        { name: "Emma Wilson", email: "emma.w@outlook.com", role: "Premium" },
        { name: "David Ross", email: "dross@biotech.co", role: "Free" },
        { name: "Jessica Lane", email: "jlane@gmail.com", role: "Premium" },
        { name: "Robert Fox", email: "fox.robert@stackly.com", role: "Free" },
        { name: "Linda Smith", email: "linda.s@biotech.co", role: "Family" },
        { name: "Chris Evans", email: "c.evans@marvel.com", role: "Premium" },
        { name: "Sophia Grey", email: "sophia@grey.com", role: "Free" },
        { name: "Tom Hardy", email: "thardy@stackly.com", role: "Premium" },
        { name: "Olivia Brown", email: "olivia.b@gmail.com", role: "Free" },
        { name: "Mark Sloan", email: "marks@biotech.co", role: "Family" },
        { name: "Lexie Grey", email: "lexie@grey.com", role: "Premium" }
    ];

    window.onload = function() {
        const tableBody = document.getElementById("userTableBody");
        users.forEach(user => {
            const row = `
                <tr>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.role}</td>
                    <td><span class="status">Active</span></td>
                    <td>
                        <button class="action-btn" onclick="window.location.href='ad_404.html'"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="action-btn" onclick="window.location.href='ad_404.html'"><i class="fa-solid fa-trash"></i></button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });

        const storedData = localStorage.getItem("userData");
        if (storedData) {
            const user = JSON.parse(storedData);
            document.getElementById("profileName").textContent = user.role || "Administrator";
            document.getElementById("profileEmail").textContent = user.email || "admin@biotech.co";
        }
    };
</script>
</body>
</html>
